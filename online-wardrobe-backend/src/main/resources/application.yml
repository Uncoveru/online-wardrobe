server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/wardrobe?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:one}
    password: ${DB_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:wardrobe-jwt-secret-key-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:3600000}

upload:
  path: upload/images

app:
  admin:
    seed:
      username: admin
      password: ${ADMIN_SEED_PASSWORD:admin123}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.wardrobe.backend.entity
  configuration:
    map-underscore-to-camel-case: true
